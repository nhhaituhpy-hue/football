name: Sync World Cup 2026 Data

on:
  schedule:
    # Chạy mỗi 6 tiếng một lần (hàng ngày)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Cho phép kích hoạt thủ công từ tab Actions trên GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cấu hình Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cài đặt thư viện dependencies
        run: npm ci

      - name: Chạy script đồng bộ dữ liệu
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync_wc2026api.js
