name = "lichworldcup-live"
main = "scripts/worker/index.ts"
compatibility_date = "2026-05-25"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *", "0 1 * * *"]

[vars]
WC2026_API_BASE_URL = "https://api.wc2026api.com"
THETHAO247_LIVE_URL = "https://thethao247.vn/livescores/the-gioi/vo-dich-the-gioi/"
GITHUB_REPO_OWNER = "nhhaituhpy-hue"
GITHUB_REPO_NAME = "football"
GITHUB_WORKFLOW_FILE = "sync_highlights.yml"

[durable_objects]
bindings = [
  { name = "LIVE_CACHE_DO", class_name = "LiveCacheObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveCacheObject"]
